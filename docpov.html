<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>TECHMED — Doctor Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji"; }
    .avatar { width:56px; height:56px; border-radius:8px; background:#e9ecef; display:inline-flex; align-items:center; justify-content:center; font-weight:600; color:#495057; }
    .appt-card .btn { white-space: nowrap; }
    .navmenu a.active { font-weight: 600; }
  </style>
</head>
<body>
  <header id="header" class="border-bottom py-2 position-sticky top-0 bg-white" style="z-index:1000;">
    <div class="container d-flex align-items-center justify-content-between">
      <a href="./docpov.html" class="text-decoration-none d-flex align-items-center">
        <h1 class="h4 m-0">TECH<span class="text-primary">MED</span></h1>
      </a>
      <nav id="navmenu" class="navmenu">
        <ul class="nav">
          <li class="nav-item"><a href="#" data-section="appointments" class="nav-link active">Dashboard</a></li>
          <li class="nav-item"><a href="#" data-section="patients" class="nav-link">Patients & Records</a></li>
          <li class="nav-item"><a href="#" data-section="profile" class="nav-link">Profile</a></li>
        </ul>
      </nav>
      <div class="d-flex align-items-center gap-2">
        <span id="headerName" class="text-muted small"></span>
        <button id="logoutBtn" class="btn btn-outline-secondary btn-sm">Logout</button>
      </div>
    </div>
  </header>

  <main id="main" class="py-4">
    <div class="container-fluid">
      <div class="row">
        <aside class="col-md-3 mb-3">
          <div class="card p-3">
            <div class="d-flex align-items-center mb-3">
              <div id="avatar" class="avatar me-2">Dr</div>
              <div>
                <div id="doc-name" class="fw-semibold">Doctor</div>
                <div class="text-muted small" id="doc-specialty">Specialty</div>
              </div>
            </div>
            <button data-section="appointments" class="btn w-100 btn-light mb-2 active">Appointments</button>
            <button data-section="patients" class="btn w-100 btn-light mb-2">Patients</button>
            <button data-section="profile" class="btn w-100 btn-light">Profile</button>
          </div>
        </aside>

        <section class="col-md-9">
          <div id="section-appointments" class="card p-3">
            <div class="d-flex align-items-center justify-content-between">
              <h4 class="m-0">Appointments</h4>
            </div>
            <ul class="nav nav-tabs mt-2" id="apptTabs" role="tablist">
              <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#upcoming">Upcoming</button></li>
              <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#past">Past</button></li>
            </ul>
            <div class="tab-content mt-3">
              <div class="tab-pane fade show active" id="upcoming">
                <div id="appointments-upcoming" class="list-group"></div>
              </div>
              <div class="tab-pane fade" id="past">
                <div id="appointments-past" class="list-group"></div>
              </div>
            </div>
          </div>

          <div id="section-patients" class="card p-3 mt-3" style="display:none">
            <div class="d-flex align-items-center justify-content-between">
              <h4 class="m-0">Patients</h4>
              <div class="input-group" style="max-width:300px">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" id="patient-search" class="form-control" placeholder="Search patients..." />
              </div>
            </div>
            <div id="patients-list" class="list-group mt-2"></div>
          </div>

          <div id="section-profile" class="card p-3 mt-3" style="display:none">
            <h4>Profile & Licenses</h4>
            <p class="text-muted">Update personal details and certifications</p>
            <form id="profile-form">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Full Name</label>
                  <input type="text" id="profile-name" class="form-control" />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Specialty</label>
                  <input type="text" id="profile-specialty" class="form-control" />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Contact Number</label>
                  <input type="text" id="profile-contact" class="form-control" />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Email</label>
                  <input type="email" id="profile-email" class="form-control" disabled />
                </div>
                <div class="col-12">
                  <label class="form-label">About</label>
                  <textarea id="profile-about" class="form-control" rows="3" placeholder="Short bio"></textarea>
                </div>
              </div>
              <div class="mt-3 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <button type="button" class="btn btn-outline-secondary" id="profile-reset">Reset</button>
              </div>
            </form>
          </div>
        </section>
      </div>
    </div>
  </main>

  <footer class="border-top py-3 text-center small text-muted">© TECHMED</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="./firebase-init.js"></script>
  <script src="./docpov.js"></script>
</body>
</html>
