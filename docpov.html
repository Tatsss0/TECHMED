<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>TECHMED — Doctor POV</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2c3e50" />

  <!-- Favicons -->
  <link href="logo512.png" rel="icon">
  <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Poppins:wght@300;500;700&family=Ubuntu:wght@400;500;700&display=swap"
    rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

  <!-- Main CSS File -->
  <link href="assets/css/main.css" rel="stylesheet">
  <link href="docpov.css" rel="stylesheet">
</head>

<body class="index-page">
  <!-- Header -->
  <header id="header" class="header d-flex align-items-center fixed-top">
    <div class="container d-flex align-items-center justify-content-between">
      <a href="techmed.php" class="logo d-flex align-items-center me-auto me-xl-0">
        <h1 class="sitename">TECH<span>MED</span></h1>
      </a>
      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="#" class="active">Dashboard</a></li>
          <li><a href="#" data-section="patients">Patients & Records</a></li>
          <li><a href="#" data-section="profile">Profile</a></li>
        </ul>
      </nav>
      <!-- Notifications -->
      <div class="dropdown">
        <button class="btn btn-light position-relative" id="notifyDropdown" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="bi bi-bell"></i>
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notify-count" style="display:none">0</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end p-2" style="width:300px;max-height:360px;overflow:auto;" aria-labelledby="notifyDropdown" id="notify-list">
          <li class="text-muted small px-2">No new notifications</li>
        </ul>
      </div>
    </div>
  </header>

  <!-- Doctor POV Content -->
  <main id="main" class="mt-5 pt-4">
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <aside class="col-md-3 mb-3">
          <div class="card p-3">
            <div class="d-flex align-items-center mb-3">
              <img class="avatar me-2" id="avatar"
                src="https://via.placeholder.com/56x56.png?text=Dr"
                alt="avatar" style="width:56px;height:56px;border-radius:8px;">
              <div>
                <div id="doc-name">Dr. John Doe</div>
                <div class="text-muted small" id="doc-specialty">Endocrinologist</div>
              </div>
            </div>
            <button data-section="appointments" class="btn w-100 btn-light mb-2 active">Appointments</button>
          </div>
        </aside>

        <!-- Main sections -->
        <section class="col-md-9">
          <!-- Appointments -->
          <div id="section-appointments" class="card p-3">
            <h4>Appointments</h4>
            <ul class="nav nav-tabs mt-2" id="apptTabs" role="tablist">
              <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#upcoming">Upcoming</button>
              </li>
              <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#pending">Pending</button>
              </li>
              <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#past">Past</button>
              </li>
            </ul>
            <div class="tab-content mt-3">
              <div class="tab-pane fade show active" id="upcoming">
                <div id="appointments-upcoming" class="list-group"></div>
              </div>
              <div class="tab-pane fade" id="pending">
                <div id="appointments-pending" class="list-group"></div>
              </div>
              <div class="tab-pane fade" id="past">
                <div id="appointments-past" class="list-group"></div>
              </div>
            </div>
          </div>

          <!-- Patients -->
          <div id="section-patients" class="card p-3 mt-3" style="display:none">
            <div class="d-flex align-items-center justify-content-between">
              <h4>Patients</h4>
              <div class="input-group" style="max-width:300px">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" id="patient-search" class="form-control" placeholder="Search patients..." />
              </div>
            </div>
            <div id="patients-list" class="list-group mt-2"></div>
          </div>

          <!-- Profile -->
          <div id="section-profile" class="card p-3 mt-3" style="display:none">
            <h4>Profile & Licenses</h4>
            <p class="text-muted">Update personal details and certifications</p>
            <!-- Edit Profile Form -->
            <form id="profile-form">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Full Name</label>
                  <input type="text" id="profile-name" class="form-control" value="Dr. John Doe">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Specialty</label>
                  <input type="text" id="profile-specialty" class="form-control" value="Endocrinologist">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Contact Number</label>
                  <input type="text" id="profile-contact" class="form-control" value="+639123456789">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Email</label>
                  <input type="email" id="profile-email" class="form-control" value="doctor@example.com">
                </div>
                <div class="col-12">
                  <label class="form-label">About</label>
                  <textarea id="profile-about" class="form-control" rows="3" placeholder="Short bio"></textarea>
                </div>
              </div>
              <div class="mt-3 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <button type="button" class="btn btn-outline-secondary" id="profile-reset">Reset</button>
              </div>
              <hr class="my-4" />
              <h6>Licenses & Certifications</h6>
              <div class="row g-2 align-items-center">
                <div class="col-md-8"><input type="file" id="profile-license" class="form-control" multiple></div>
                <div class="col-md-4 d-grid"><button type="button" class="btn btn-outline-primary" id="license-upload">Upload</button></div>
              </div>
              <ul class="list-group mt-3" id="license-list"></ul>
            </form>
          </div>
        </section>
      </div>
    </div>
  </main>

  <!-- Patient Records Modal -->
  <div class="modal fade" id="patientModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Patient Records</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="patient-records"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer id="footer" class="footer position-relative mt-5">
    <div class="container text-center">
      <p>© <strong>TECHMED</strong> All Rights Reserved</p>
    </div>
  </footer>

  <!-- Vendor JS Files -->
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="docpov.js"></script>

</body>
</html>
