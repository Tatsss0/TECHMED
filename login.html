<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TECHMED — Doctor Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h3 class="mb-3">Doctor Login</h3>
            <form id="loginForm" class="g-3">
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required />
              </div>
              <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="remember" />
                  <label class="form-check-label" for="remember">Remember me</label>
                </div>
                <a href="#" id="forgot">Forgot password?</a>
              </div>
              <div class="d-grid">
                <button class="btn btn-primary" type="submit">Log In</button>
              </div>
              <div class="mt-3">
                <small>New here? <a href="./register.html">Create an account</a></small>
              </div>
              <div class="mt-3">
                <div id="alert" class="alert d-none" role="alert"></div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="./firebase-init.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const alertEl = document.getElementById('alert');

    function showAlert(msg, type = 'danger') {
      alertEl.textContent = msg;
      alertEl.className = 'alert alert-' + type;
    }

    // Force manual login: clear any existing session when visiting the login page
    auth.signOut().catch(()=>{});

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      try {
        auth.setPersistence(remember ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
        await auth.signInWithEmailAndPassword(email, password);
        showAlert('Login successful. Redirecting…', 'success');
        setTimeout(() => { window.location.href = './docpov.html'; }, 500);
      } catch (err) {
        console.error(err);
        showAlert(err.message || 'Login failed');
      }
    });

    document.getElementById('forgot').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) return showAlert('Enter your email to reset password', 'info');
      try {
        await auth.sendPasswordResetEmail(email);
        showAlert('Password reset email sent', 'success');
      } catch (err) {
        showAlert(err.message || 'Failed to send reset email');
      }
    });
  </script>
</body>
</html>
