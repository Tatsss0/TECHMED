<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TECHMED — Doctor Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h3 class="mb-3">Doctor Registration</h3>
            <p class="text-muted">Create your TECHMED account</p>
            <form id="registerForm" class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" id="fullName" class="form-control" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" minlength="6" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" minlength="6" required />
              </div>

              <div class="col-md-6">
                <label class="form-label">Specialty</label>
                <input type="text" id="specialty" class="form-control" placeholder="e.g. Endocrinologist" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Years of Experience</label>
                <input type="number" id="yearsExperience" class="form-control" min="0" step="1" required />
              </div>

              <div class="col-md-6">
                <label class="form-label">Medical License Number</label>
                <input type="text" id="licenseNumber" class="form-control" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Issuing Authority</label>
                <input type="text" id="licenseAuthority" class="form-control" placeholder="e.g. PRC" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">License Expiry</label>
                <input type="date" id="licenseExpiry" class="form-control" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Contact Number</label>
                <input type="tel" id="phone" class="form-control" placeholder="+63..." required />
              </div>

              <div class="col-md-6">
                <label class="form-label">Clinic/Hospital</label>
                <input type="text" id="clinicName" class="form-control" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Country</label>
                <input type="text" id="country" class="form-control" />
              </div>
              <div class="col-12">
                <label class="form-label">Clinic Address</label>
                <input type="text" id="clinicAddress" class="form-control" />
              </div>
              <div class="col-12">
                <label class="form-label">About</label>
                <textarea id="about" class="form-control" rows="3" placeholder="Short bio"></textarea>
              </div>

              <div class="col-12 form-check mt-2">
                <input class="form-check-input" type="checkbox" value="1" id="terms" required />
                <label class="form-check-label" for="terms">I agree to the Terms and Privacy Policy</label>
              </div>

              <div class="col-12 d-grid mt-2">
                <button class="btn btn-primary" type="submit">Create Account</button>
              </div>
              <div class="col-12 mt-2">
                <small>Already have an account? <a href="./login.html">Log in</a></small>
              </div>
              <div class="col-12 mt-2">
                <div id="alert" class="alert d-none" role="alert"></div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="./firebase-init.js"></script>
  <script>
    const form = document.getElementById('registerForm');
    const alertEl = document.getElementById('alert');

    function showAlert(msg, type = 'danger') {
      alertEl.textContent = msg;
      alertEl.className = 'alert alert-' + type;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (password !== confirmPassword) { return showAlert('Passwords do not match'); }

      const specialty = document.getElementById('specialty').value.trim();
      const yearsExperience = Number(document.getElementById('yearsExperience').value || 0);
      const licenseNumber = document.getElementById('licenseNumber').value.trim();
      const licenseAuthority = document.getElementById('licenseAuthority').value.trim();
      const licenseExpiry = document.getElementById('licenseExpiry').value;
      const phone = document.getElementById('phone').value.trim();
      const clinicName = document.getElementById('clinicName').value.trim();
      const clinicAddress = document.getElementById('clinicAddress').value.trim();
      const country = document.getElementById('country').value.trim();
      const about = document.getElementById('about').value.trim();

      try {
        showAlert('Creating account…', 'info');
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await cred.user.updateProfile({ displayName: fullName.startsWith('Dr.') ? fullName : 'Dr. ' + fullName });
        const uid = cred.user.uid;
        await db.collection('doctors').doc(uid).set({
          uid,
          email,
          fullName,
          role: 'doctor',
          specialty,
          yearsExperience,
          phone,
          about,
          clinic: { name: clinicName, address: clinicAddress, country },
          license: { number: licenseNumber, authority: licenseAuthority, expiry: licenseExpiry },
          avatarUrl: '',
          status: 'pending_verification',
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        showAlert('Registration successful. Redirecting…', 'success');
        setTimeout(() => { window.location.href = './docpov.html'; }, 800);
      } catch (err) {
        console.error(err);
        showAlert(err.message || 'Registration failed');
      }
    });
  </script>
</body>
</html>
