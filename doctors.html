      <script>
      document.addEventListener("DOMContentLoaded", function () {
        const doctorInput = document.getElementById("doctorInput");
        const dateInput = document.getElementById("dateInput");
        const timeSelect = document.getElementById("timeSelect");
        const buttons = document.querySelectorAll(".btn-appointment");

        // Doctor schedules
        const doctorSchedules = {
          "Dr. Amelia Brooks": { workingDays: [1,3,5], times: ["09:00 AM","10:30 AM","02:00 PM"] },
          "Dr. Noah Turner":   { workingDays: [2,4],   times: ["11:00 AM","01:00 PM","04:00 PM"] },
          "Dr. Sofia Bennett": { workingDays: [1,2,3,4], times: ["10:00 AM","12:30 PM","03:30 PM"] }
        };

        // Example booked slots (Y-m-d: [times])
        const bookedSlots = {
          "Dr. Amelia Brooks": {
            "2025-09-08": ["09:00 AM"],
            "2025-09-10": ["09:00 AM","10:30 AM","02:00 PM"]
          },
          "Dr. Noah Turner": {
            "2025-09-11": ["11:00 AM","01:00 PM","04:00 PM"]
          }
        };

        let selectedDoctor = "";
        let fpInstance;

        function isFullyBooked(doctor, dateStr) {
          const doc = doctorSchedules[doctor];
          if (!doc) return true;
          const booked = (bookedSlots[doctor] && bookedSlots[doctor][dateStr]) || [];
          return booked.length >= doc.times.length;
        }

        function recalc() { fpInstance.redraw(); }

        fpInstance = flatpickr(dateInput, {
          inline: true,
          dateFormat: "Y-m-d",
          disableMobile: true,
          disable: [
            function(date) {
              if (!selectedDoctor) return true;
              const calMonth = fpInstance.currentMonth;
              const calYear  = fpInstance.currentYear;
              if (date.getMonth() !== calMonth || date.getFullYear() !== calYear) return true;
              const doc = doctorSchedules[selectedDoctor];
              if (!doc || !doc.workingDays.includes(date.getDay())) return true;
              const dateStr = fpInstance.formatDate(date, "Y-m-d");
              return isFullyBooked(selectedDoctor, dateStr);
            }
          ],
          onDayCreate: function(dObj, dStr, fp, dayElem) {
            if (!selectedDoctor) return;
            const doc = doctorSchedules[selectedDoctor];
            const d = dayElem.dateObj;
            const sameMonth = (d.getMonth() === fp.currentMonth && d.getFullYear() === fp.currentYear);
            if (!sameMonth) return;
            const dateStr = fp.formatDate(d, "Y-m-d");
            const working = doc && doc.workingDays.includes(d.getDay());
            if (working) {
              if (isFullyBooked(selectedDoctor, dateStr)) dayElem.classList.add("booked");
              else dayElem.classList.add("available");
            } else {
              dayElem.classList.add("unavailable");
            }
          },
          onChange: function(selectedDates, dateStr) {
            timeSelect.innerHTML = '<option value="">Select Time</option>';
            if (!selectedDoctor || !dateStr) return;
            const doc = doctorSchedules[selectedDoctor];
            if (!doc) return;
            const booked = (bookedSlots[selectedDoctor] && bookedSlots[selectedDoctor][dateStr]) || [];
            doc.times.forEach(time => {
              if (booked.includes(time)) return;
              const opt = document.createElement("option");
              opt.value = time; opt.textContent = time;
              timeSelect.appendChild(opt);
            });
          },
          onMonthChange: recalc,
          onYearChange: recalc,
          onReady: recalc
        });

        // Choose doctor
        buttons.forEach(button => {
          button.addEventListener("click", function (e) {
            e.preventDefault();
            selectedDoctor = this.getAttribute("data-doctor");
            doctorInput.value = selectedDoctor;
            fpInstance.clear();
            timeSelect.innerHTML = '<option value="">Select Time</option>';
            fpInstance.redraw();
            document.querySelector("#appointment").scrollIntoView({ behavior: "smooth" });
          });
        });
      });
      </script>
